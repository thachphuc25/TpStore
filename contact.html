<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ - TPstore.</title>
    <meta
      name="description"
      content="Liên hệ với PC Parts Shop. Tư vấn linh kiện, hỗ trợ kỹ thuật, build PC miễn phí."
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="header"></div>

    <div class="container">
      <div class="contact-header" style="padding-top: 3rem">
        <h1>Liên hệ với chúng tôi</h1>
        <p>Bạn cần tư vấn hoặc hỗ trợ? Hãy liên hệ ngay!</p>
      </div>

      <div class="contact-layout">
        <div>
          <div class="contact-info-grid">
            <div class="contact-info-card">
              <div class="icon">📞</div>
              <p class="label">Điện thoại</p>
              <p class="value">0123 456 789</p>
            </div>
            <div class="contact-info-card">
              <div class="icon">📧</div>
              <p class="label">Email</p>
              <p class="value">info@electroparts.vn</p>
            </div>
            <div class="contact-info-card">
              <div class="icon">📍</div>
              <p class="label">Địa chỉ</p>
              <p class="value">123 Đường ABC, Q.1, TP.HCM</p>
            </div>
            <div class="contact-info-card">
              <div class="icon">🕐</div>
              <p class="label">Giờ làm việc</p>
              <p class="value">T2-T7: 8:00 - 18:00</p>
            </div>
          </div>

          <div class="contact-map">
            <iframe
              title="map"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.394768!2d106.700981!3d10.780321!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDQ2JzQ5LjIiTiAxMDbCsDQyJzAzLjUiRQ!5e0!3m2!1svi!2svn!4v1234567890"
              loading="lazy"
            ></iframe>
          </div>
        </div>

        <form class="contact-form" onsubmit="submitContact(event)">
          <h3>Gửi tin nhắn</h3>
          <div class="form-group">
            <label>Họ tên *</label>
            <input type="text" required placeholder="Nguyễn Văn A" />
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" required placeholder="email@example.com" />
          </div>
          <div class="form-group">
            <label>Chủ đề</label>
            <input type="text" placeholder="Tư vấn linh kiện cho dự án..." />
          </div>
          <div class="form-group">
            <label>Nội dung *</label>
            <textarea
              rows="4"
              required
              placeholder="Nội dung tin nhắn..."
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">
            ✉️ Gửi tin nhắn
          </button>
        </form>
      </div>
    </div>

    <div id="footer"></div>

    <script src="js/products-data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script>
      function submitContact(e) {
        e.preventDefault();
        showToast(
          "Đã gửi tin nhắn thành công! Chúng tôi sẽ phản hồi sớm nhất.",
        );
        e.target.reset();
      }
    </script>
  </body>
</html>
